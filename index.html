<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F0E8" />
    <meta name="description" content="AI-powered language learning exercises" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Verbose" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="icons/icon-96x96.png" />
    <title>Verbose</title>
    <!-- Tailwind CSS (pre-built, matches Claude artifact renderer) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
      // Make React hooks available as globals
      var { useState, useEffect, useCallback, useRef } = React;

      // Storage shim: replaces Claude artifact window.storage with localStorage
      if (!window.storage) {
        window.storage = {
          async get(key) {
            var value = localStorage.getItem(key);
            return value !== null ? { key: key, value: value } : null;
          },
          async set(key, value) {
            localStorage.setItem(key, value);
            return { key: key, value: value };
          },
          async delete(key) {
            localStorage.removeItem(key);
            return { key: key, deleted: true };
          },
          async list(prefix) {
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (!prefix || k.startsWith(prefix)) keys.push(k);
            }
            return { keys: keys };
          }
        };
      }
    </script>

    <!-- Pre-transpiled app -->
    <script src="App.js"></script>

    <!-- Mount -->
    <script>
      var root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(window.C1EnglishApp));
    </script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js')
            .then(function(reg) { console.log('SW registered:', reg.scope); })
            .catch(function(err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
