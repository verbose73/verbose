<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF6B35" />
  <title>Verbose - Offline</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F0E8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .container { padding: 2rem; }
    .fox { font-size: 64px; margin-bottom: 1rem; }
    h1 { color: #FF6B35; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 1rem; margin-bottom: 1.5rem; }
    button { background: #FF6B35; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="fox">🦊</div>
    <h1>You're offline</h1>
    <p>Verbose needs an internet connection for the first load.<br>Please reconnect and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
